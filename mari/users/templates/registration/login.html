{% extends "base.html" %}

{% block title %}Login{% endblock title %}

{% block content %}
    <div>
        <div class="d-flex justify-content-center mt-5">
            <form method="post" class="border border-white rounded shadow px-5 py-3 mb-5 mt-3 bg-white ">
                {% csrf_token %}

                <div class="d-flex justify-content-center">
                    <h1 class="h3">Login</h1>
                </div>

                <div class="mb-3 mt-3 h6">
                    <label for="{{ form.email.id_for_label }}">Email</label>
                    <br>
                    {{ form.email }}
                </div>

                <div class="mb-3 h6">
                    <label for="{{ form.password.id_for_label }}">Password</label>
                    <br>
                    {{ form.password }}
                </div>

                <div class="d-flex justify-content-center mt-4 mb-3">
                    <button type="submit" class="btn btn-dark m3" style="font-size:14px">SUBMIT</button>
                </div>

                <div class="d-flex justify-content-center text-muted h6 mt-4">
                    <p><a href="{% url 'users:password_reset' %}" class="text-decoration-none text-muted">Forgot the password?</a></p>
                </div>
            </form>
        </div>
    </div>
{% endblock content %}
