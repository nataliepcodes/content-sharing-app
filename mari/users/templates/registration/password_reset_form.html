{% extends "base.html" %}

{% block title %}Reset password{% endblock %}

{% block content %}
    <h1>Forgot your password?</h1>
    <p>Enter your email address below to get a link to reset your password.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="d-flex justify-content-center mt-4 mb-3">
                 <button type="submit" class="btn btn-dark m3" style="font-size:14px">SUBMIT</button>
        </div>
    </form>
{% endblock %}
