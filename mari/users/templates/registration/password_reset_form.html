{% extends "base.html" %}

{% block title %}Reset password{% endblock %}

{% block content %}
    <div>
        <div class="d-flex flex-column align-items-center mt-5">
            <h1 class="h3">Forgot your password?</h1>
            <p>Enter your email address below.</p>
            <p>We will send you a link to reset your password.</p>

            <form method="post" class="border border-white rounded shadow px-5 mb-5 mt-3 bg-white ">
                {% csrf_token %}

                <div class="mb-3 mt-3 h6">
                    <label for="{{ form.email.id_for_label }}">Email</label>
                    <br>
                    {{ form.email }}
                </div>

                <div class="d-flex justify-content-center mt-4 mb-3">
                    <button type="submit" class="btn btn-dark m3" style="font-size:14px">SUBMIT</button>
                </div>

            </form>
        </div>
    </div>
{% endblock content %}
