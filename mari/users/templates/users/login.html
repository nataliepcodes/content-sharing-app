{% extends "base.html" %}
{% block title %}Login{% endblock title %}
{% block content %}
    <div>
        <div class="d-flex justify-content-center mt-5">
            <form method="post" class="border border-white rounded shadow px-5 py-3 mb-5 mt-3 bg-white ">
                <!-- CSRF to be placed before {{ form.as_p }}  variable -->
                {% csrf_token %}

                <div class="d-flex justify-content-center">
                    <h1>Login</h1>
                </div>

                <div class="mb-3 mt-3">
                    <label for="{{ form.password.id_for_label }}">Email</label>
                    <br>
                    {{ form.email }}
                </div>

                <div class="mb-3">
                    <label for="{{ form.password.id_for_label }}">Password</label>
                    <br>
                    {{ form.password }}
                </div>

                <div class="d-flex justify-content-center mt-4">
                    <button type="submit" class="btn btn-dark">Submit</button>
                </div>
            </form>
        </div>
    </div>
{% endblock content %}
